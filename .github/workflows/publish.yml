name: Publish Container Images

on:
  push:
    branches: [master]
    tags: ["v*.*.*"]

permissions:
  contents: read
  packages: write
  security-events: write          # for Trivy SARIF upload

env:
  REGISTRY: ghcr.io

jobs:
  # ── CI Gates ──────────────────────────────────────────────────────────
  backend-ci:
    name: Backend CI
    uses: ./.github/workflows/backend.yml

  frontend-ci:
    name: Frontend CI
    uses: ./.github/workflows/frontend.yml

  integration-ci:
    name: Integration Tests
    uses: ./.github/workflows/integration.yml
    secrets: inherit

  # ── Backend ──────────────────────────────────────────────────────────
  publish-backend:
    name: Backend image
    needs: [backend-ci, frontend-ci, integration-ci]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/vibe-coded-backend
          tags: |
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ github.repository_owner }}/vibe-coded-backend@${{ steps.build.outputs.digest }}
          format: sarif
          output: backend-trivy.sarif
          severity: CRITICAL,HIGH
          exit-code: "0"

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: backend-trivy.sarif
          category: backend-trivy

  # ── Frontend ─────────────────────────────────────────────────────────
  publish-frontend:
    name: Frontend image
    needs: [backend-ci, frontend-ci, integration-ci]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/vibe-coded-frontend
          tags: |
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ github.repository_owner }}/vibe-coded-frontend@${{ steps.build.outputs.digest }}
          format: sarif
          output: frontend-trivy.sarif
          severity: CRITICAL,HIGH
          exit-code: "0"

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: frontend-trivy.sarif
          category: frontend-trivy
