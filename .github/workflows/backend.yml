name: Backend CI

on:
  push:
    branches: [master, dev]
    paths:
      - "backend/**"
  pull_request:
    branches: [master, dev]
    paths:
      - "backend/**"

defaults:
  run:
    working-directory: backend

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt -r tests/requirements.txt

      - name: Ruff check
        run: python -m ruff check .

      - name: Ruff format check
        run: python -m ruff format --check .

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt -r tests/requirements.txt

      - name: Run tests
        env:
          DEV: "1"
          SESSION_SECRET: "dev-only-not-for-production"
        run: |
          python -m pytest tests/ -v --import-mode=importlib --cache-clear \
            --cov=. --cov-report=term-missing

  build:
    name: Build check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Verify Alembic migrations
        env:
          DEV: "1"
        run: python -m alembic check 2>/dev/null || python -m alembic heads

      - name: Docker build (dry run)
        run: docker build -t vibe-coded-backend:ci .
