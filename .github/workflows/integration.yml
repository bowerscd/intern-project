name: Integration Tests

on:
  pull_request:
    branches: [master, dev]
  workflow_call:

jobs:
  integration:
    name: E2E Tests
    runs-on: ubuntu-latest
    env:
      SESSION_SECRET: ci-test-secret-not-for-production

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: integration-tests/requirements.txt

      - name: Install test dependencies
        run: pip install -r integration-tests/requirements.txt

      - name: Install Playwright browsers
        run: playwright install --with-deps chromium

      - name: Build and start Docker Compose stack
        working-directory: integration-tests
        run: docker compose up --build -d

      - name: Wait for services to be healthy
        working-directory: integration-tests
        run: |
          echo "Waiting for backend..."
          timeout 120 bash -c 'until docker compose ps backend | grep -q healthy; do sleep 5; done'
          echo "Waiting for frontend..."
          timeout 120 bash -c 'until docker compose ps frontend | grep -q healthy; do sleep 5; done'

      - name: Run integration tests
        working-directory: integration-tests
        env:
          BACKEND_URL: http://127.0.0.1:8000
          FRONTEND_URL: http://127.0.0.1:5000
        run: python -m pytest . -v --timeout=60

      - name: Tear down stack
        if: always()
        working-directory: integration-tests
        run: docker compose down -v --remove-orphans
