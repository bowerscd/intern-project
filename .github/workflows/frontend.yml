name: Frontend CI

on:
  pull_request:
    branches: [master, dev]
    paths:
      - "frontend/**"
  workflow_call:

defaults:
  run:
    working-directory: frontend

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: frontend/requirements.txt

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: npm-

      - name: Install Python dependencies
        run: pip install -r requirements.txt -r tests/requirements.txt

      - name: Install Node dependencies
        run: npm ci

      - name: Lint
        run: make lint

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: frontend/requirements.txt

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: npm-

      - name: Install Python dependencies
        run: pip install -r requirements.txt -r tests/requirements.txt

      - name: Install Node dependencies
        run: npm ci

      - name: Run tests
        run: make test

  build:
    name: Build check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: npm-

      - name: Install Node dependencies
        run: npm ci

      - name: Compile TypeScript
        run: npx tsc -p tsconfig.json

      - name: Docker build (dry run)
        run: docker build -t vibe-coded-frontend:ci .
