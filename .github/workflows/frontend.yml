name: Frontend CI

on:
  pull_request:
    branches: [master, dev]
    paths:
      - "frontend/**"
  workflow_call:

defaults:
  run:
    working-directory: frontend

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: frontend/requirements.txt

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: npm-

      - name: Install Python dependencies
        run: pip install -r requirements.txt -r tests/requirements.txt

      - name: Install Node dependencies
        run: npm ci

      - name: Ruff check
        run: python -m ruff check .

      - name: Ruff format check
        run: python -m ruff format --check .

      - name: TypeScript type check
        run: npx tsc -p tsconfig.json --noEmit

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: frontend/requirements.txt

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: npm-

      - name: Install Python dependencies
        run: pip install -r requirements.txt -r tests/requirements.txt

      - name: Install Node dependencies
        run: npm ci

      - name: Run Python tests
        run: python -m pytest tests/ -v --cov=app --cov-report=term-missing

      - name: Run TypeScript tests
        run: npx vitest run

  build:
    name: Build check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: npm-

      - name: Install Node dependencies
        run: npm ci

      - name: Compile TypeScript
        run: npx tsc -p tsconfig.json

      - name: Docker build (dry run)
        run: docker build -t vibe-coded-frontend:ci .
