<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>{{ title }} · Vibe Coded</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:wght@400;700&family=Cabin:wght@400;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@400;500;700&family=Fira+Code:wght@400;500&family=Fira+Sans:wght@400;600&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Lato:wght@200;300;400;700&family=Libre+Baskerville:wght@400;700&family=Merriweather:wght@400;700&family=Nunito:wght@400;600;700;800&family=Orbitron:wght@400;700;900&family=Playfair+Display:wght@400;700&family=Poppins:wght@400;600;700&family=Press+Start+2P&family=Quicksand:wght@400;500;600;700&family=Rajdhani:wght@400;500;700&family=Roboto:wght@300;400;500;700&family=Share+Tech+Mono&family=Source+Code+Pro:wght@400;500&family=Source+Sans+3:wght@400;600;700&display=swap" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/themes.css') }}" />
    <script>
      /* Apply saved theme instantly to prevent flash of wrong theme */
      (function() {
        var t = localStorage.getItem('vibe-theme');
        if (t) document.documentElement.setAttribute('data-theme', t);
      })();
    </script>
  </head>
  <body data-page="{{ title }}" data-api-base="{{ api_base | default('') }}" data-use-mock="{{ 'true' if use_mock else 'false' }}" data-dev-mode="{{ 'true' if dev_mode else 'false' }}">
    <div class="app-layout">
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
          <a href="/" class="brand">Vibe Coded</a>
        </div>
        <nav class="sidebar-nav" id="sidebar-nav">
          <a href="/happyhour">Happy Hour</a>
          <a href="/mealbot" data-requires="MEALBOT" class="nav-hidden">Mealbot</a>
          <a href="/mealbot/individualized" data-requires="MEALBOT" class="nav-hidden">My Summary</a>
          <a href="/admin" data-requires="ADMIN" class="nav-hidden">Admin</a>
          <a href="/account" data-requires="auth" class="nav-hidden">Account</a>
          <a href="/login" data-requires="guest" id="nav-login">Login</a>
          <a href="#" data-requires="auth" class="nav-hidden" id="nav-logout">Logout</a>
        </nav>
      </aside>
      <div class="sidebar-overlay" id="sidebar-overlay"></div>

      <div class="main-wrapper">
        <header class="mobile-header" id="mobile-header">
          <button class="menu-toggle" id="menu-toggle" aria-label="Toggle menu">☰</button>
          <span class="mobile-title">{{ title }}</span>
        </header>
        <main class="page">
          {% block content %}{% endblock %}
        </main>
      </div>
    </div>

    <script src="{{ url_for('static', filename='js/config.js') }}"></script>
    <script src="{{ url_for('static', filename='js/sidebar.js') }}"></script>
    <script type="module" src="{{ url_for('static', filename='dist/main.js') }}"></script>
  </body>
</html>
