{% extends "base.html" %}
{% block content %}
<section class="card prominent-card">
  <h2>Current Happy Hour</h2>
  <div id="public-current-happyhour"></div>
</section>
<section class="card">
  <h2>Happy Hour Rotation</h2>
  <div class="scrollable-content" id="public-rotation-scroll-container">
    <div id="public-rotation"></div>
  </div>
</section>
<section class="card">
  <h2>Past Happy Hours</h2>
  <div class="scrollable-content" id="past-scroll-container">
    <div id="public-past-happyhours"></div>
    <div id="past-sentinel" class="scroll-sentinel"></div>
    <div id="past-status" class="scroll-status"></div>
  </div>
</section>
{% endblock %}
