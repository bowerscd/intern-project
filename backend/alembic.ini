# Alembic configuration — used by the ``alembic`` CLI.
#
# The ``sqlalchemy.url`` value is intentionally left blank here because
# ``env.py`` resolves it at runtime from ``config.DATABASE_URI`` (which
# reads ``settings.json`` → environment variable → default).
#
# To run migrations against a specific database, either:
#   1. Set ``database_uri`` in ``settings.json``, or
#   2. Set the ``DATABASE_URI`` environment variable, or
#   3. Pass ``-x sqlalchemy.url=sqlite:///path.db`` on the CLI.

[alembic]
script_location = migrations
prepend_sys_path = .
path_separator = os
sqlalchemy.url =

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
